# Use node-modules linker for broad tooling compatibility (Vite, etc.).
nodeLinker: node-modules

# Block all install scripts by default. Allowlist exceptions in dependenciesMeta.
enableScripts: false

# Additional integrity checks on package resolution.
enableHardenedMode: true

# Block packages published within the last 7 days (minutes). Yarn v4.10+.
npmMinimalAgeGate: 10080

# Note: the install-script allowlist (esbuild) lives in package.json's
# `dependenciesMeta` field — Yarn reads `built: true` from there, not here.
